<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timur — UX Designer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo">Timur</div>

            <div class="weather-widget" id="weather-widget" aria-live="polite">
                <div class="weather-display">
                    <div class="weather-emoji">☀️</div>
                    <div class="weather-temp">--°F</div>
                    <div class="weather-location"></div>
                </div>

                <form class="weather-zip" id="weather-zip" onsubmit="return false;">
                    <input id="zip-input" class="weather-input" type="text" inputmode="numeric" maxlength="10" placeholder="ZIP" aria-label="ZIP code">
                    <button id="zip-submit" class="weather-submit">Go</button>
                </form>
            </div>

            <!-- nav links removed per request -->
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <p class="hero-subtitle">UX Designer by day, 3D hobbyist by night</p>
            <h1>Retrofuturism is my jam</h1>
            <p class="hero-description">Watching "Alien" and "Aliens" at the tender age of 10 left a deep, lasting impression—now most of my work feels like it belongs in those worlds.</p>
            <!-- CTA buttons removed -->
        </div>
    </section>

    <!-- Masonry Image Gallery -->
    <section id="gallery-section" class="gallery-section">
        <div class="section-container">
            <!-- Images header removed per request -->
            <div id="gallery" class="masonry-gallery">
                <div class="gallery-loader" id="gallery-loader" aria-hidden="true">
                    <div class="spinner"></div>
                </div>
                <div class="gallery-columns" id="gallery-columns" aria-live="polite"></div>
            </div>
            <!-- helper note removed -->
        </div>
    </section>




    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Timur. Designed and coded with care.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
